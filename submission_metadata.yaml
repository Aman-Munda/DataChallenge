# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Kilo (AI coding assistant)"

ai_usage_summary: |
  Used Kilo for architecture design, code implementation, debugging, and
  deck generation. All candidate scoring logic is deterministic and rule-based.
  No candidate data was fed to any LLM during ranking. TF-IDF + cosine
  similarity is computed locally with scikit-learn.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-layer hybrid scoring: (1) TF-IDF cosine similarity over 50K features
  captures holistic profile-to-JD relevance; (2) Domain intelligence layer
  with trust-weighted skill scoring (proficiency × endorsements × duration),
  career trajectory analysis, product-vs-consulting classification, and
  production deployment evidence; (3) Behavioral layer weighting availability,
  responsiveness, and engagement signals. Honeypot detection catches ~80
  fake profiles via duration mismatches, impossible expertise claims, and
  keyword stuffing. Anti-disqualification penalties for consulting-only
  careers, CV/speech-only without NLP/IR, and no production ML evidence.
  Runs on CPU in ~45 seconds with zero network calls.

# ============================================================================
# Declarations
# ============================================================================
declarations:
